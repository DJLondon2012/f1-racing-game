<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
  <title>F1 Racing Pro - Ultimate Racing Experience</title>
  <style>
    /* (styles omitted for brevity in commit) */
  </style>
</head>
<body>

<div id="menu-overlay" class="menu-overlay">
  <div class="menu-container">
    <h1 class="menu-title">🏎️ F1 RACING PRO</h1>
    <p class="menu-subtitle">Ultimate Racing Experience</p>
    <div class="button-group">
      <button class="btn" id="play-btn">PLAY RACE</button>
      <button class="btn secondary" id="garage-btn">GARAGE</button>
      <button class="btn secondary" id="settings-btn">SETTINGS</button>
    </div>
  </div>
</div>

<div id="mode-overlay" class="menu-overlay hidden">
  <button class="back-btn" id="back-mode-btn">← BACK</button>
  <div class="menu-container">
    <h1 class="menu-title">SELECT TRACK</h1>

    <div style="margin-top: 10px; margin-bottom: 20px;">
      <label for="race-mode" style="font-weight:700;color:#8899ff;margin-right:10px;">Mode:</label>
      <select id="race-mode">
        <option value="single">Single Race</option>
        <option value="time_trial">Time Trial</option>
        <option value="championship">Championship</option>
        <option value="practice">Practice</option>
        <option value="sprint">Sprint</option>
        <option value="elimination">Elimination</option>
        <option value="multiplayer">Multiplayer</option>
      </select>
    </div>

    <div class="grid-2" style="margin-top: 20px;">
      <div class="card" id="monaco-track">MONACO</div>
      <div class="card" id="monza-track">MONZA</div>
      <div class="card" id="silverstone-track">SILVERSTONE</div>
      <div class="card" id="suzuka-track">SUZUKA</div>
    </div>
  </div>
</div>

<canvas id="game-canvas"></canvas>

<script type="module">
// Minimal JS additions for race modes
const trackModes = { 'monaco-track': 'monaco', 'monza-track': 'monza', 'silverstone-track': 'silverstone', 'suzuka-track': 'suzuka' };
const playBtn = document.getElementById('play-btn');
const menuOverlay = document.getElementById('menu-overlay');
const modeOverlay = document.getElementById('mode-overlay');

playBtn.addEventListener('click', () => { menuOverlay.classList.add('hidden'); modeOverlay.classList.remove('hidden'); });
Object.entries(trackModes).forEach(([id, track]) => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('click', () => {
    const modeEl = document.getElementById('race-mode');
    const mode = modeEl ? modeEl.value : 'single';
    // store to localStorage so other scripts can read
    localStorage.setItem('f1_mode', mode);
    localStorage.setItem('f1_track', track);
    // reload to let main game initialize with new mode (quick hack)
    location.reload();
  });
});
</script>
</body>
</html>
